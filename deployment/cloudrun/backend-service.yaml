apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cityops-ai-backend
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "CityOps AI Backend API"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/cityops-ai-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-api-key
                  key: latest
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: firebase-project-id
                  key: latest
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: firebase-client-email
                  key: latest
            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: firebase-private-key
                  key: latest
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: storage-bucket
                  key: latest
            - name: MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: maps-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 15
